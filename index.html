<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niya's Japanese Culinary & Culture Homestay</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="site-title">Niya's Homestay</h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="#youtube">料理教室</a></li>
                    <li><a href="#homestay">ホームステイ</a></li>
                    <li><a href="#profile">Niyaについて</a></li>
                    <li><a href="#instagram">Instagram</a></li>
                    <li><a href="#bizen-dao">BizenDAO</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-main-content">
                <div class="hero-image-area">
                    <div class="hero-slideshow-wrapper">
                        <div class="hero-image-pair active">
                            <img src="./assets/images/hero_image_1.jpg" alt="Japanese Tea and Sweets" class="hero-image">
                            <img src="./assets/images/hero_image_2.jpg" alt="Japanese Bento Lunch" class="hero-image">
                        </div>
                        <div class="hero-image-pair">
                            <img src="./assets/images/hero_image_3.jpg" alt="Inari Sushi and Seafood" class="hero-image">
                            <img src="./assets/images/hero_image_4.jpg" alt="Bizen Ware Kintsugi" class="hero-image">
                        </div>
                    </div>
                </div>
                <div class="hero-content-area">
                    <div class="hero-content">
                        <h2 class="hero-catchphrase">
                            Experience Authentic Japanese <span class="accent-text">Culinary & Culture</span> with Professor Niya
                        </h2>
                        <p class="hero-description">
                            日本の食文化と暮らしを、プロの料理家であるNiyaとAIエージェントのRinがおもてなし。
                            リアルな日本をアクティブに体験する、特別なホームステイへようこそ。
                        </p>
                        <a href="#homestay" class="btn-primary">ホームステイを詳しく見る</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- 他のセクションは後で追加 -->

    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 <a href="https://github.com/rin-bonsoleil/rin-bonsoleil.github.io" target="_blank" rel="noopener noreferrer">Niya</a>. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
